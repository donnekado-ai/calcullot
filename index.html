<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur de Lot - Trading</title>
<style>
:root {
--bg-color: #0c0d14;
--container-bg: #131722;
--input-bg: #1e222d;
--border-color: #2a2e39;
--text-main: #d1d4dc;
--text-muted: #787b86;
--accent-color: #2962ff;
--accent-hover: #1e4bd6;
--success-color: #089981;
--danger-color: #f23645;
--font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-family); -webkit-font-smoothing: antialiased; }
body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.calculator-card { background-color: var(--container-bg); border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 480px; padding: 30px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }
.header { text-align: center; margin-bottom: 25px; }
.header h1 { font-size: 24px; font-weight: 600; color: #ffffff; margin-bottom: 6px; letter-spacing: -0.5px; }
.header p { color: var(--text-muted); font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.input-wrapper { position: relative; display: flex; align-items: center; }
.input-wrapper span.prefix { position: absolute; left: 15px; color: var(--text-muted); font-size: 15px; pointer-events: none; }
.input-wrapper select, .input-wrapper input { width: 100%; background-color: var(--input-bg); border: 1px solid var(--border-color); color: #ffffff; padding: 12px 15px; border-radius: 6px; font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.input-wrapper select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23787b86' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; }
.input-wrapper input[data-has-prefix="true"] { padding-left: 32px; }
.input-wrapper select:focus, .input-wrapper input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(41, 98, 255, 0.2); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.result-container { background: linear-gradient(135deg, rgba(41, 98, 255, 0.08) 0%, rgba(41, 98, 255, 0.02) 100%); border: 1px dashed rgba(41, 98, 255, 0.3); border-radius: 8px; padding: 20px; margin-top: 25px; text-align: center; }
.result-label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; }
.result-value { font-size: 36px; font-weight: 700; color: var(--success-color); margin-bottom: 15px; font-family: Monaco, Consolas, monospace; }
.result-details { border-top: 1px solid var(--border-color); padding-top: 12px; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); }
.result-details span strong { color: #ffffff; }
.btn-copy { background-color: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 15px; transition: all 0.2s; font-weight: 500; }
.btn-copy:hover { background-color: var(--border-color); color: #ffffff; }
.btn-copy:active { transform: scale(0.98); }
.footer-note { text-align: center; font-size: 11px; color: rgba(242, 54, 69, 0.7); margin-top: 15px; }
</style>
</head>
<body>

<div class="calculator-card">
<div class="header">
<h1>Position Sizer</h1>
<p>Calculateur de Lots Pro (Compte 1)</p>
</div>

<div class="form-group">
<label for="asset">Actif</label>
<div class="input-wrapper">
<select id="asset">
<option value="XAUUSD">XAUUSD (Or)</option>
<option value="NAS100" selected>NAS100 (Nasdaq)</option>
<option value="GER40">GER40 (Dax)</option>
<option value="US30">US30 (Dow Jones)</option>
<option value="SP500">SP500 (S&P500)</option>
</select>
</div>
</div>

<div class="form-group">
<label for="balance">Capital du Compte</label>
<div class="input-wrapper">
<span class="prefix">$</span>
<input type="number" id="balance" value="10000" step="any" data-has-prefix="true">
</div>
</div>

<div class="grid-2">
<div class="form-group">
<label for="risk-percent">Risque (%)</label>
<div class="input-wrapper">
<input type="number" id="risk-percent" value="1" step="0.1" min="0.1" max="100">
</div>
</div>

<div class="form-group">
<label id="sl-label" for="stop-loss">Stop Loss (Points)</label>
<div class="input-wrapper">
<input type="number" id="stop-loss" value="50" step="any">
</div>
</div>
</div>

<div class="result-container">
<div class="result-label">Taille du Lot Recommandée</div>
<div class="result-value" id="lot-output">0.20</div>

<div class="result-details">
<span>Risque : <strong id="risk-cash-output">$100.00</strong></span>
<span>Valeur/Point : <strong id="point-value-output">$0.10</strong></span>
</div>

<button class="btn-copy" id="btn-copy">Copier le lot</button>
</div>

<div class="footer-note">
⚠️ Rappel : Si vous tradez sur le Compte 2, divisez ce lot par 10 (décalez la virgule à gauche).
</div>
</div>

<script>
const assetSelect = document.getElementById('asset');
const balanceInput = document.getElementById('balance');
const riskPercentInput = document.getElementById('risk-percent');
const stopLossInput = document.getElementById('stop-loss');
const slLabel = document.getElementById('sl-label');

const lotOutput = document.getElementById('lot-output');
const riskCashOutput = document.getElementById('risk-cash-output');
const pointValueOutput = document.getElementById('point-value-output');
const btnCopy = document.getElementById('btn-copy');

const assetSpecs = {
XAUUSD: { pointValuePerLot: 100, label: "Stop Loss (Pips/Points)" },
NAS100: { pointValuePerLot: 1, label: "Stop Loss (Points)" },
GER40: { pointValuePerLot: 1, label: "Stop Loss (Points)" },
US30: { pointValuePerLot: 1, label: "Stop Loss (Points)" },
SP500: { pointValuePerLot: 1, label: "Stop Loss (Points)" }
};

function calculateLot() {
const asset = assetSelect.value;
const balance = parseFloat(balanceInput.value) || 0;
const riskPercent = parseFloat(riskPercentInput.value) || 0;
const stopLoss = parseFloat(stopLossInput.value) || 0;

slLabel.innerText = assetSpecs[asset].label;

if (balance <= 0 || riskPercent <= 0 || stopLoss <= 0) {
lotOutput.innerText = "0.00"; riskCashOutput.innerText = "$0.00"; pointValueOutput.innerText = "$0.00"; return;
}

const riskCash = balance * (riskPercent / 100);
const pointValuePerLot = assetSpecs[asset].pointValuePerLot;
let calculatedLot = riskCash / (stopLoss * pointValuePerLot);
calculatedLot = Math.round(calculatedLot * 100) / 100;

if (!isFinite(calculatedLot) || calculatedLot < 0) { calculatedLot = 0.00; }
const finalPointValue = calculatedLot * pointValuePerLot;

lotOutput.innerText = calculatedLot.toFixed(2);
riskCashOutput.innerText = "$" + riskCash.toFixed(2);
pointValueOutput.innerText = "$" + finalPointValue.toFixed(2);
}

[assetSelect, balanceInput, riskPercentInput, stopLossInput].forEach(element => {
element.addEventListener('input', calculateLot);
});

btnCopy.addEventListener('click', () => {
const lotText = lotOutput.innerText;
navigator.clipboard.writeText(lotText).then(() => {
const originalText = btnCopy.innerText;
btnCopy.innerText = "Copié ! ✔";
btnCopy.style.backgroundColor = "var(--success-color)";
btnCopy.style.color = "#ffffff";
setTimeout(() => {
btnCopy.innerText = originalText;
btnCopy.style.backgroundColor = "var(--input-bg)";
btnCopy.style.color = "var(--text-main)";
}, 1500);
});
});

calculateLot();
</script>
</body>
</html>
